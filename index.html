<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Creature Clash Premium</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. PREMIUM CSS VARIABLES & SAFE AREAS 
           ========================================= */
        :root {
            /* Apple HIG Safe Areas */
            --sat: env(safe-area-inset-top, 20px);
            --sab: env(safe-area-inset-bottom, 20px);
            
            /* Core Palette */
            --bg-dark: #0B1120;
            --panel-bg: rgba(30, 41, 59, 0.85);
            --panel-border: rgba(255, 255, 255, 0.15);
            
            /* Action Colors */
            --primary: #3B82F6; --primary-dark: #1D4ED8;
            --success: #10B981; --success-dark: #047857;
            --danger: #EF4444;  --danger-dark: #B91C1C;
            --warning: #F59E0B; --warning-dark: #B45309;
            --purple:  #A855F7; --purple-dark:  #6B21A8;
            
            --text-main: #F8FAFC;
        }

        /* RESET & BASE */
        * { 
            box-sizing: border-box; user-select: none; -webkit-user-select: none; 
            -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; 
            font-family: 'Outfit', sans-serif; touch-action: none;
        }
        
        /* Bulletproof mobile viewport - defeats Safari Blue Bars */
        html, body { 
            background: var(--bg-dark); overflow: hidden; width: 100vw; height: 100dvh; 
            position: fixed; inset: 0; color: var(--text-main); overscroll-behavior: none;
        }
        
        #game-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; outline: none; display: block; }
        
        #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 100; transition: opacity 0.2s ease-out; }

        /* SCREENS & TRANSITIONS */
        .screen { 
            position: absolute; inset: 0; z-index: 10; display: none; flex-direction: column; 
            pointer-events: none; padding: calc(var(--sat) + 15px) 15px calc(var(--sab) + 15px) 15px; 
            animation: fadeIn 0.3s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .active-screen { display: flex; }
        .interactive { pointer-events: auto; }

        .font-display { font-family: 'Lilita One', cursive; }

        /* =========================================
           2. TACTILE 3D BUTTONS 
           ========================================= */
        .btn { 
            background: linear-gradient(180deg, #60A5FA, var(--primary)); color: white; border: none;
            border-radius: 18px; padding: 16px 12px; font-size: 20px; cursor: pointer; 
            text-align: center; text-transform: uppercase; box-shadow: 0 6px 0 var(--primary-dark), 0 10px 20px rgba(0,0,0,0.4); 
            transition: transform 0.1s, box-shadow 0.1s; letter-spacing: 1.5px; min-height: 60px;
            border: 2px solid rgba(255,255,255,0.2); text-shadow: 0 2px 2px rgba(0,0,0,0.4); 
            position: relative; overflow: hidden;
        }
        .btn::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 35%;
            background: linear-gradient(180deg, rgba(255,255,255,0.3), transparent);
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--primary-dark), 0 4px 8px rgba(0,0,0,0.4); }
        
        .btn-success { background: linear-gradient(180deg, #34D399, var(--success)); box-shadow: 0 6px 0 var(--success-dark), 0 10px 20px rgba(0,0,0,0.4); }
        .btn-success:active { box-shadow: 0 2px 0 var(--success-dark), 0 4px 8px rgba(0,0,0,0.4); }
        
        .btn-danger { background: linear-gradient(180deg, #F87171, var(--danger)); box-shadow: 0 6px 0 var(--danger-dark), 0 10px 20px rgba(0,0,0,0.4); }
        .btn-danger:active { box-shadow: 0 2px 0 var(--danger-dark), 0 4px 8px rgba(0,0,0,0.4); }
        
        .btn-purple { background: linear-gradient(180deg, #C084FC, var(--purple)); box-shadow: 0 6px 0 var(--purple-dark), 0 10px 20px rgba(0,0,0,0.4); }
        .btn-purple:active { box-shadow: 0 2px 0 var(--purple-dark), 0 4px 8px rgba(0,0,0,0.4); }
        
        .btn-neutral { background: linear-gradient(180deg, #94A3B8, #64748B); box-shadow: 0 6px 0 #334155, 0 10px 20px rgba(0,0,0,0.4); }
        .btn-neutral:active { box-shadow: 0 2px 0 #334155, 0 4px 8px rgba(0,0,0,0.4); }

        /* =========================================
           3. UI SCREENS 
           ========================================= */
        #menu-ui { 
            background: linear-gradient(135deg, #1E293B, #0F172A, #1E1B4B); background-size: 400% 400%;
            animation: gradientMove 10s ease infinite; align-items: center; justify-content: center; 
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .title {
            font-size: 76px; text-align: center; line-height: 0.95; margin-bottom: 60px;
            background: linear-gradient(180deg, #FEF08A, #F59E0B); -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; filter: drop-shadow(0 12px 8px rgba(0,0,0,0.7)); 
            transform: rotate(-3deg); letter-spacing: 2px; animation: floatTitle 3s ease-in-out infinite;
            -webkit-text-stroke: 2px #0B1120;
        }
        @keyframes floatTitle { 0%, 100% { transform: rotate(-3deg) translateY(0); } 50% { transform: rotate(-3deg) translateY(-10px); } }

        /* EXPLORATION */
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 600px; margin: 0 auto; pointer-events: auto;}
        .pill { 
            background: var(--panel-bg); padding: 14px 22px; border-radius: 30px; font-weight: 800; 
            border: 2px solid var(--panel-border); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 10px; font-size: 16px; 
            cursor: pointer; transition: transform 0.1s; text-transform: uppercase; letter-spacing: 1px;
        }
        .pill:active { transform: scale(0.92); }
        
        #joystick-zone { position: absolute; bottom: 0; left: 0; width: 100%; height: 50%; pointer-events: auto; }
        #joy-base { 
            position: absolute; width: 140px; height: 140px; background: rgba(15, 23, 42, 0.4); 
            border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; transform: translate(-50%, -50%); 
            pointer-events: none; display: none; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); 
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6), 0 10px 30px rgba(0,0,0,0.4);
        }
        #joy-knob { 
            position: absolute; width: 64px; height: 64px; background: linear-gradient(180deg, #FFFFFF, #CBD5E1); 
            border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.6), inset 0 -4px 6px rgba(0,0,0,0.2); 
        }

        /* BATTLE HUD */
        .hud { 
            background: var(--panel-bg); border: 2px solid var(--panel-border); border-radius: 20px; 
            padding: 16px 20px; width: 100%; max-width: 340px; box-shadow: 0 12px 30px rgba(0,0,0,0.6); 
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); 
        }
        .enemy-hud { align-self: flex-end; border-right: 6px solid var(--danger); margin-bottom: 20px; border-radius: 20px 0 20px 20px;} 
        .player-hud { align-self: flex-start; border-left: 6px solid var(--primary); border-radius: 0 20px 20px 20px;}
        
        .hud-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; }
        .c-name { font-size: 24px; text-shadow: 0 2px 4px rgba(0,0,0,0.6); letter-spacing: 1px;}
        .c-lvl { font-size: 15px; font-weight: 800; color: #CBD5E1; }
        
        .type-tag { 
            font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: 900; 
            border: 2px solid rgba(255,255,255,0.4); text-transform: uppercase; margin-left: 10px; 
            vertical-align: middle; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-family: 'Outfit', sans-serif;
        }

        .hp-bg { 
            position: relative; width: 100%; height: 26px; background: #020617; border-radius: 13px; 
            border: 2px solid rgba(255,255,255,0.2); overflow: hidden; box-shadow: inset 0 2px 8px rgba(0,0,0,0.8); 
        }
        .hp-fill { 
            height: 100%; background: linear-gradient(180deg, #34D399, var(--success)); width: 100%; 
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.4s; position: relative;
        }
        .hp-fill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 40%; background: linear-gradient(180deg, rgba(255,255,255,0.5), transparent); }
        .hp-text {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 900; color: white; text-shadow: 0 2px 4px black; letter-spacing: 1px; z-index: 2; pointer-events: none;
        }

        /* BATTLE BOTTOM PANEL */
        .battle-bottom { pointer-events: auto; width: 100%; max-width: 500px; align-self: center; margin-top: auto; padding-bottom: 5px;}
        .msg-box { 
            background: linear-gradient(180deg, rgba(30,41,59,0.9), rgba(15,23,42,0.95)); border: 2px solid rgba(255,255,255,0.3); 
            border-radius: 18px; padding: 20px; font-size: 22px; font-weight: normal; letter-spacing: 1px; min-height: 85px; 
            text-align: center; box-shadow: 0 12px 30px rgba(0,0,0,0.6); display: flex; 
            align-items: center; justify-content: center; margin-bottom: 16px; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        #moves-menu { display: none; }
        .move-details { font-size: 13px; color: rgba(255,255,255,0.95); display: block; margin-top: 6px; font-weight: 800; background: rgba(0,0,0,0.4); padding: 4px; border-radius: 8px; text-shadow: none; font-family: 'Outfit', sans-serif; letter-spacing: 0.5px;}

        /* JUICE: FLOATING DAMAGE */
        .dmg-text {
            position: absolute; color: #FFF; font-size: 48px; text-shadow: 0 6px 0 #0F172A, 0 12px 20px rgba(0,0,0,0.7);
            pointer-events: none; z-index: 100; transform: translate(-50%, 0) scale(0.5); opacity: 0;
            -webkit-text-stroke: 2px #0F172A; text-align: center; line-height: 1;
        }
        .dmg-text.animate { animation: floatDmg 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .dmg-super { color: #FDE047; font-size: 56px; }
        .dmg-weak { color: #94A3B8; font-size: 36px; }
        @keyframes floatDmg {
            0% { opacity: 0; transform: translate(-50%, 0) scale(0.5); }
            15% { opacity: 1; transform: translate(-50%, -30px) scale(1.2); }
            30% { transform: translate(-50%, -40px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -120px) scale(0.8); }
        }

        /* POKEDEX */
        #pokedex-ui { background: var(--bg-dark); pointer-events: auto; }
        .dex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 16px; overflow-y: auto; padding-bottom: 60px; margin-top: 20px; align-content: flex-start; }
        .dex-card { 
            background: linear-gradient(145deg, #1E293B, #0F172A); border: 2px solid rgba(255,255,255,0.1); border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 16px 12px; aspect-ratio: 1; cursor: pointer; transition: all 0.1s; box-shadow: 0 6px 15px rgba(0,0,0,0.4); 
        }
        .dex-card:active { transform: scale(0.94); box-shadow: 0 2px 5px rgba(0,0,0,0.4); }
        .dex-card.caught { border-color: var(--primary); background: rgba(30, 58, 138, 0.4); }
        .dex-card canvas { width: 64px; height: 64px; margin-bottom: 12px; filter: drop-shadow(0 6px 6px rgba(0,0,0,0.6)); }
        .dex-card.uncaught canvas { filter: brightness(0); opacity: 0.2; }
        .dex-id { font-size: 14px; color: #94A3B8; font-weight: 900; }
        .dex-name { font-size: 15px; font-weight: 800; margin-top: 4px; text-align: center; color: white;}

    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <canvas id="game-canvas"></canvas>
    <div id="flash"></div>

    <div id="menu-ui" class="screen active-screen interactive">
        <div class="title font-display">CREATURE<br>CLASH</div>
        <button class="btn btn-success font-display" onclick="startAdventure()" style="padding: 24px 80px; font-size: 26px; border-radius: 40px; animation: pulse 2s infinite;">TAP TO START</button>
        <div style="color:rgba(255,255,255,0.5); font-size:13px; font-weight:900; position:absolute; bottom: max(30px, env(safe-area-inset-bottom)); letter-spacing: 3px;">PREMIUM EDITION</div>
    </div>
    <style>@keyframes pulse { 0% { transform: scale(1); box-shadow: 0 8px 0 var(--success-dark), 0 0 0 0 rgba(16,185,129,0.7); } 70% { transform: scale(1.05); box-shadow: 0 8px 0 var(--success-dark), 0 0 0 20px rgba(16,185,129,0); } 100% { transform: scale(1); box-shadow: 0 8px 0 var(--success-dark), 0 0 0 0 rgba(16,185,129,0); } }</style>

    <div id="explore-ui" class="screen">
        <div class="top-bar interactive">
            <div class="pill" onclick="healTeam()" id="heal-btn">✚ Heal Lead</div>
            <div class="pill" onclick="openPokedex()" style="background:var(--primary); border-color:var(--primary-dark);">📖 <span id="dex-count">1</span>/28</div>
        </div>
        <div id="joystick-zone">
            <div id="joy-base"><div id="joy-knob"></div></div>
        </div>
    </div>

    <div id="battle-ui" class="screen">
        <div class="hud enemy-hud">
            <div class="hud-top">
                <div><span id="e-name" class="c-name font-display">Wild</span> <span class="type-tag" id="e-type">TYPE</span></div>
                <span class="c-lvl">Lv.<span id="e-lvl">5</span></span>
            </div>
            <div class="hp-bg"><div class="hp-fill" id="e-hp"></div><div class="hp-text" id="e-hp-text">10/10</div></div>
        </div>
        
        <div class="hud player-hud">
            <div class="hud-top">
                <div><span id="p-name" class="c-name font-display">Player</span> <span class="type-tag" id="p-type">TYPE</span></div>
                <span class="c-lvl">Lv.<span id="p-lvl">5</span></span>
            </div>
            <div class="hp-bg"><div class="hp-fill" id="p-hp"></div><div class="hp-text" id="p-hp-text">10/10</div></div>
        </div>
        <div style="flex:1;"></div>
        
        <div class="battle-bottom">
            <div class="msg-box font-display" id="msg-box">A wild creature appeared!</div>
            <div class="action-grid" id="main-menu">
                <button class="btn btn-danger font-display" onclick="showMoves()">⚔️ Fight</button>
                <button class="btn btn-success font-display" onclick="attemptCapture()">🎒 Catch</button>
                <button class="btn btn-purple font-display" onclick="usePotion()">🧪 Potion</button>
                <button class="btn btn-neutral font-display" onclick="runAway()">🏃 Run</button>
            </div>
            <div class="action-grid" id="moves-menu">
                <button class="btn font-display" id="btn-m0" onclick="attack(0)">Move 1</button>
                <button class="btn font-display" id="btn-m1" onclick="attack(1)">Move 2</button>
                <button class="btn btn-neutral font-display" style="grid-column: span 2;" onclick="showMainMenu()">🔙 Back</button>
            </div>
        </div>
    </div>

    <div id="pokedex-ui" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; padding-bottom: 15px; border-bottom: 2px solid rgba(255,255,255,0.1);">
            <h2 class="font-display" style="font-size:36px; color:var(--warning); letter-spacing: 2px;">DATABASE</h2>
            <button class="btn btn-danger font-display" onclick="closePokedex()" style="padding:12px 24px; min-height: 48px; font-size: 18px;">Close</button>
        </div>
        <div style="color:var(--success); background:rgba(16,185,129,0.2); padding:10px; border-radius:12px; font-weight:800; font-size:15px; margin-top:20px; text-align:center;">Tap any caught creature to set as Lead!</div>
        <div class="dex-grid" id="dex-grid"></div>
    </div>

function loadSave() {
    try {
        const s = localStorage.getItem('crcl_v5');
        if(s) { const d = JSON.parse(s); playerTeam = d.t; pokedex = d.p; } else throw "new";
    } catch(e) {
        playerTeam = [{ id:0, level:5, hp:CREATURES[0].hp, maxHp:CREATURES[0].hp, atk:CREATURES[0].atk, def:CREATURES[0].def, spd:CREATURES[0].spd, m:CREATURES[0].m }];
        pokedex = [0]; saveGame();
    }
}
function saveGame() { try { localStorage.setItem('crcl_v5', JSON.stringify({t: playerTeam, p: pokedex})); } catch(e){} }

function showDamage(num, isP, effMsg) {
    const el = document.createElement('div');
    el.className = `dmg-text ${effMsg === 'Super effective!' ? 'dmg-super' : effMsg === 'Not very effective...' ? 'dmg-weak' : ''}`;
    el.innerHTML = `-${num}<br><span style="font-size:16px; -webkit-text-stroke:0; text-shadow:0 2px 2px #000;">${effMsg || ''}</span>`;
    document.getElementById('battle-ui').appendChild(el);
    
    const pos = (isP ? bPlayerMesh.position : bEnemyMesh.position).clone();
    pos.y += 2.5; pos.project(battleCamera);
    const x = (pos.x * .5 + .5) * window.innerWidth; 
    const y = (pos.y * -.5 + .5) * window.innerHeight;
    
    el.style.left = `${x}px`; el.style.top = `${y}px`;
    void el.offsetWidth; el.classList.add('animate');
    setTimeout(() => el.remove(), 1000);
}

function startAdventure() {
    initAudio(); loadSave(); playSnd('success');
    mapCamera.position.set(playerMesh.position.x + 10, 10, playerMesh.position.z + 10);
    document.getElementById('menu-ui').classList.remove('active-screen'); document.getElementById('explore-ui').classList.add('active-screen');
    document.getElementById('dex-count').innerText = pokedex.length; document.getElementById('heal-btn').innerHTML = `✚ Heal ${CREATURES[playerTeam[0].id].name}`;
    STATE = 'MAP';
}

function healTeam() {
    playSnd('success'); playerTeam.forEach(p => p.hp = p.maxHp); saveGame();
    const f = document.getElementById('flash'); f.style.background = '#10B981'; f.style.opacity = '0.3'; setTimeout(() => { f.style.opacity = '0'; f.style.background = 'white'; }, 200);

function usePotion() {
    if(battleLock) return; battleLock = true; document.getElementById('main-menu').style.display='none';
    playSnd('success'); playerTeam[0].hp = Math.min(playerTeam[0].maxHp, playerTeam[0].hp + 30); updateBattleUI();

function openPokedex() {
    STATE = 'POKEDEX'; resetJoy(); document.getElementById('explore-ui').classList.remove('active-screen'); document.getElementById('pokedex-ui').classList.add('active-screen');
    const g = document.getElementById('dex-grid');
    if(g.children.length === 0) {
        CREATURES.forEach((c, i) => {
            const card = document.createElement('div'); card.id = `dex-${c.id}`;
            const cvs = document.createElement('canvas'); cvs.width=64; cvs.height=64;
            cvs.getContext('2d').drawImage(texCanvas, (i%8)*128, Math.floor(i/8)*128, 128, 128, 0, 0, 64, 64);
            card.appendChild(cvs);
            const idL = document.createElement('div'); idL.className='dex-id'; idL.innerText=`#${(c.id+1).toString().padStart(3,'0')}`; card.appendChild(idL);
            const nL = document.createElement('div'); nL.className='dex-name'; nL.id=`dex-name-${c.id}`; card.appendChild(nL);
            g.appendChild(card);
        });
    }
    CREATURES.forEach(c => {
        const caught = pokedex.includes(c.id);
        const card = document.getElementById(`dex-${c.id}`);
        card.className = `dex-card ${caught ? 'caught' : 'uncaught'}`;
        document.getElementById(`dex-name-${c.id}`).innerText = caught ? c.name : '???';
        card.onclick = caught ? () => { 
            playSnd('success'); const t = playerTeam.find(pt => pt.id === c.id);
            if(t) { const idx = playerTeam.indexOf(t); playerTeam.splice(idx,1); playerTeam.unshift(t); } 
            else { const rL = playerTeam[0]?playerTeam[0].level:5; playerTeam.unshift({ id:c.id, level:rL, hp:Math.floor(c.hp*(rL/5)), maxHp:Math.floor(c.hp*(rL/5)), atk:Math.floor(c.atk*(rL/5)), def:Math.floor(c.def*(rL/5)), spd:Math.floor(c.spd*(rL/5)), m:c.m }); if(playerTeam.length>6) playerTeam.pop(); }
            saveGame(); closePokedex(); document.getElementById('heal-btn').innerHTML = `✚ Heal ${c.name}`;
        } : null;
    });
}
function closePokedex() { STATE = 'MAP'; document.getElementById('pokedex-ui').classList.remove('active-screen'); document.getElementById('explore-ui').classList.add('active-screen'); }

function updateBattleUI() {
    const p = playerTeam[0], e = currentEnemy, pB = CREATURES[p.id], eB = CREATURES[e.id];

    document.getElementById('e-type').innerText = eB.type; document.getElementById('e-type').style.background = TYPES[eB.type].c;
    const eP = Math.max(0, Math.min(100, (e.hp/e.maxHp)*100)); document.getElementById('e-hp').style.width = `${eP}%`; document.getElementById('e-hp-text').innerText = `${Math.floor(e.hp)}/${e.maxHp}`;
    document.getElementById('e-hp').style.background = eP>50?'linear-gradient(180deg, #34D399, var(--success))':eP>20?'linear-gradient(180deg, #FDE047, var(--warning))':'linear-gradient(180deg, #F87171, var(--danger))';

function showMoves() { 
    if(battleLock) return; playSnd('hit');
    document.getElementById('main-menu').style.display='none'; document.getElementById('moves-menu').style.display='grid';
    [0,1].forEach(i => {

function showMainMenu() { document.getElementById('main-menu').style.display='grid'; document.getElementById('moves-menu').style.display='none'; playSnd('hit'); }

function attack(mIdx) {
    if(battleLock) return; battleLock = true; document.getElementById('moves-menu').style.display='none';
    const pMName = playerTeam[0].m[mIdx], eMName = currentEnemy.m[Math.floor(Math.random()*currentEnemy.m.length)];
    const pFirst = playerTeam[0].spd >= currentEnemy.spd;
    const f = pFirst ? {a:'P', m:pMName} : {a:'E', m:eMName}, s = pFirst ? {a:'E', m:eMName} : {a:'P', m:pMName};
    execTurn(f.a, f.m, () => { if(checkEnd()) return; setTimeout(() => { execTurn(s.a, s.m, () => { if(!checkEnd()) { showMainMenu(); battleLock=false; } }); }, 1000); });
}

function enemyTurn() {
    battleLock = true; document.getElementById('main-menu').style.display='none';
    const eMName = currentEnemy.m[Math.floor(Math.random()*currentEnemy.m.length)];
    execTurn('E', eMName, () => { if(!checkEnd()) { showMainMenu(); battleLock=false; } });
}

function emitParticles(pos, colorHex, amount=20) {
    ptMat.color.setHex(colorHex); let spawned = 0;
    for(let i=0; i<50; i++) {
        if(pData[i].life <= 0) {
            pData[i].life = 1.0 + Math.random()*0.2; pData[i].pos.copy(pos); pData[i].pos.y += 1.0;
            pData[i].pos.x += (Math.random()-0.5)*1.5; pData[i].pos.y += (Math.random()-0.5)*1.5;
            pData[i].vel.set((Math.random()-0.5)*0.3, Math.random()*0.3 + 0.1, (Math.random()-0.5)*0.3);
            spawned++; if(spawned >= amount) break;
        }
    }
}

let bShake = 0;

function execTurn(who, mName, cb) {
    const isP = who==='P', msh = isP?bPlayerMesh:bEnemyMesh, tgt = isP?bEnemyMesh:bPlayerMesh;
    const att = isP?playerTeam[0]:currentEnemy, def = isP?currentEnemy:playerTeam[0];
    const mData = MOVES[mName], defBase = CREATURES[def.id], attBase = CREATURES[att.id];
    
    logMsg(`${attBase.name} used ${mName}!`);
    const oP = msh.position.clone(); 
    
    let lStep = 0; const lIntv = setInterval(() => {
        lStep += 0.2; msh.position.lerpVectors(oP, tgt.position, lStep);
        if(lStep >= 0.4) {
            clearInterval(lIntv); msh.position.copy(oP); // Snap back
            tgt.position.x += 0.5; setTimeout(()=>{tgt.position.x-=1; setTimeout(()=>{tgt.position.copy(isP ? new THREE.Vector3(3.5,0,-3.5) : new THREE.Vector3(-3.5,0,3.5));},50);},50);
            
            let eff = 1; if(TYPES[mData.t].s===defBase.type) eff=2; if(TYPES[mData.t].w===defBase.type) eff=0.5;
            let dmg = (((2*att.level/5+2)*mData.p*(att.atk/def.def))/50)+2;
            if(mData.t===attBase.type) dmg*=1.5; dmg = Math.max(1, Math.floor(dmg * eff * (0.85+Math.random()*0.15)));
            
            def.hp = Math.max(0, def.hp - dmg); updateBattleUI();
            
            const hexColor = parseInt(TYPES[mData.t].c.replace('#', '0x')); 
            emitParticles(tgt.position, hexColor, 25);
            bShake = 0.5 + (eff > 1 ? 0.3 : 0); // Trigger 3D camera shake
            
            let effMsg = ""; if(eff>1) effMsg="Super effective!"; if(eff<1) effMsg="Not very effective...";
            showDamage(dmg, !isP, effMsg);
            
            if(eff>1) { playSnd('super'); setTimeout(()=>logMsg(effMsg), 1000); setTimeout(cb, 2200); }
            else if(eff<1) { playSnd('hit'); setTimeout(()=>logMsg(effMsg), 1000); setTimeout(cb, 2200); }
            else { playSnd('hit'); setTimeout(cb, 1200); }
        }
    }, 16);
}

function checkEnd() {
    if(currentEnemy.hp <= 0) {
        playSnd('faint'); bEnemyMesh.visible=false; logMsg(`Wild ${CREATURES[currentEnemy.id].name} fainted! You won!`);
        playerTeam[0].level++; playerTeam[0].maxHp+=2; playerTeam[0].atk+=1; playerTeam[0].def+=1; playerTeam[0].spd+=1;
        if(!pokedex.includes(currentEnemy.id)) pokedex.push(currentEnemy.id);
        saveGame(); setTimeout(exitBattle, 2500); return true;
    }
    if(playerTeam[0].hp <= 0) {
        playSnd('faint'); bPlayerMesh.visible=false; logMsg("You blacked out!"); playerTeam.forEach(p => p.hp = p.maxHp);
        setTimeout(exitBattle, 2500); return true;
    } return false;
}

function attemptCapture() {
    if(battleLock) return; battleLock = true; document.getElementById('main-menu').style.display='none';
    logMsg("Threw a Capture Device!"); playSnd('throw'); ballMesh.position.set(-3.5,0,3.5); ballMesh.visible=true;
    
    let stp = 0; const startP = new THREE.Vector3(-3.5,0,3.5), endP = new THREE.Vector3(3.5,0,-3.5);
    const intv = setInterval(() => {
        stp += 0.04; ballMesh.position.lerpVectors(startP, endP, stp); 
        ballMesh.position.y = Math.sin(stp*Math.PI)*4; // Perfect Parabola
        ballMesh.rotation.z -= 0.4;
        
        if(stp>=1) {
            clearInterval(intv); bEnemyMesh.visible=false; ballMesh.position.copy(endP); ballMesh.position.y=0; ballMesh.rotation.z=0;
            const flash = document.getElementById('flash'); flash.style.opacity = '1'; setTimeout(()=>flash.style.opacity='0', 100);
            
            let shk = 0;
            const sIntv = setInterval(() => {
                shk++; playSnd('shake'); bShake = 0.3;
                ballMesh.quaternion.setFromAxisAngle(new THREE.Vector3(0,0,1), 0.5); setTimeout(()=>ballMesh.quaternion.setFromAxisAngle(new THREE.Vector3(0,0,1), -0.5),100); setTimeout(()=>ballMesh.quaternion.copy(batRot),200);
                if(shk>=3) {
                    clearInterval(sIntv);
                    const hpRatio = currentEnemy.hp/currentEnemy.maxHp; let chance = 0.3 + (1-hpRatio)*0.7; if(hpRatio <= 0.05) chance = 1.0; 
                    if(Math.random() < chance) {
                        playSnd('success'); logMsg(`Gotcha! ${CREATURES[currentEnemy.id].name} caught!`);
                        if(playerTeam.length<6) playerTeam.push(JSON.parse(JSON.stringify(currentEnemy))); if(!pokedex.includes(currentEnemy.id)) pokedex.push(currentEnemy.id);
                        document.getElementById('dex-count').innerText = pokedex.length; saveGame(); emitParticles(ballMesh.position, 0xF59E0B, 40); setTimeout(exitBattle, 2500);
                    } else {
                        playSnd('hit'); logMsg("It broke free!"); ballMesh.visible=false; bEnemyMesh.visible=true;
                        flash.style.opacity = '1'; setTimeout(()=>flash.style.opacity='0', 100); setTimeout(enemyTurn, 1500);
                    }
                }
            }, 800);
        }
    }, 16);
}

function runAway() { if(battleLock) return; battleLock=true; document.getElementById('main-menu').style.display='none'; logMsg("Got away safely!"); setTimeout(exitBattle, 1200); }
function exitBattle() { STATE = 'MAP'; battleLock=false; resetJoy(); document.getElementById('battle-ui').classList.remove('active-screen'); document.getElementById('explore-ui').classList.add('active-screen'); document.getElementById('heal-btn').innerHTML = `✚ Heal ${CREATURES[playerTeam[0].id].name}`; }

const joyZone = document.getElementById('joystick-zone'), joyBase = document.getElementById('joy-base'), joyKnob = document.getElementById('joy-knob');
let joyActive = false, jDir = {x:0, y:0}, jOrig = {x:0, y:0};

const resetJoy = () => { joyActive=false; jDir={x:0,y:0}; joyKnob.style.transform=`translate(-50%,-50%)`; joyBase.style.display='none'; };
joyZone.addEventListener('pointerdown', e => { if(STATE !== 'MAP') return; joyActive=true; jOrig={x:e.clientX, y:e.clientY}; joyBase.style.left=e.clientX+'px'; joyBase.style.top=e.clientY+'px'; joyBase.style.display='block'; updateJoy(e); });
window.addEventListener('pointermove', e => { if(joyActive && STATE === 'MAP') updateJoy(e); });
window.addEventListener('pointerup', resetJoy); window.addEventListener('pointercancel', resetJoy); window.addEventListener('pointerleave', resetJoy);

function updateJoy(e) {
    let dx = e.clientX-jOrig.x, dy = e.clientY-jOrig.y, dist = Math.hypot(dx,dy), max = 50;
    if(dist>max) { dx=(dx/dist)*max; dy=(dy/dist)*max; }
    joyKnob.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`; jDir.x=dx/max; jDir.y=dy/max;
}

let lastT = performance.now();
function animate(t) {
    requestAnimationFrame(animate); 
    const dt = Math.min((t - lastT) / 1000, 0.1); lastT = t; const tSec = t / 1000;
    
    if (STATE === 'MENU') {
        playerMesh.position.x = Math.sin(tSec * 0.8) * 4; playerMesh.position.z = Math.cos(tSec * 0.8) * 4;
        mapCamera.position.x += ((playerMesh.position.x + 10) - mapCamera.position.x) * 0.1; mapCamera.position.z += ((playerMesh.position.z + 10) - mapCamera.position.z) * 0.1;
        renderer.render(mapScene, mapCamera);
    } 
    else if(STATE === 'MAP' || STATE === 'POKEDEX') {
        if(STATE === 'MAP' && joyActive) {
            playerMesh.position.x += (jDir.x + jDir.y) * 14 * dt; playerMesh.position.z += (-jDir.x + jDir.y) * 14 * dt;
            const limit = (mapSize / 2) - 2;
            if(playerMesh.position.x > limit) playerMesh.position.x = limit; if(playerMesh.position.x < -limit) playerMesh.position.x = -limit;
            if(playerMesh.position.z > limit) playerMesh.position.z = limit; if(playerMesh.position.z < -limit) playerMesh.position.z = -limit;
            
            for(let i=0; i<wildMeshes.length; i++) {
                if(playerMesh.position.distanceTo(wildMeshes[i].position) < 2.5) {
                    resetJoy(); playSnd('encounter'); 
                    enterBattle(wildMeshes[i].userData.id, Math.max(1, playerTeam[0].level + Math.floor(Math.random()*3)-1));
                    let wx = playerMesh.position.x+(Math.random()-0.5)*30, wz = playerMesh.position.z+(Math.random()-0.5)*30;
                    if(wx>limit) wx=limit; if(wx<-limit) wx=-limit; if(wz>limit) wz=limit; if(wz<-limit) wz=-limit;
                    wildMeshes[i].position.set(wx, 0, wz); wildMeshes[i].userData.sx = wx; wildMeshes[i].userData.sz = wz; break;
                }
            }
        }
        playerMesh.position.y = Math.abs(Math.sin(tSec * (joyActive ? 15 : 5))) * (joyActive ? 0.3 : 0.05);
        wildMeshes.forEach((m) => { 
            m.position.y = Math.abs(Math.sin(tSec * 5 + m.userData.tOff)) * 0.3; 
            m.position.x = m.userData.sx + Math.sin(tSec * 0.5 + m.userData.tOff) * 1.5;
            m.position.z = m.userData.sz + Math.cos(tSec * 0.5 + m.userData.tOff) * 1.5;
        });
        
        mapCamera.position.x += ((playerMesh.position.x + 10) - mapCamera.position.x) * 0.1;
        mapCamera.position.z += ((playerMesh.position.z + 10) - mapCamera.position.z) * 0.1;
        renderer.render(mapScene, mapCamera);
        
    } else if(STATE === 'BATTLE') {
        if(bShake > 0) {
            battleCamera.position.x = (Math.random()-0.5) * bShake;
            battleCamera.position.y = 4 + (Math.random()-0.5) * bShake;
            bShake *= 0.85; if(bShake < 0.02) bShake = 0;
        } else {
            battleCamera.position.set(0, 4, 12);
        }
        
        if(!battleLock) { bPlayerMesh.position.y = Math.sin(tSec * 4) * 0.2; bEnemyMesh.position.y = Math.cos(tSec * 4) * 0.2; }
        
        let pDirty = false;
        for(let i=0; i<50; i++) {
            if(pData[i].life > 0) {
                pData[i].life -= dt * 1.5; pData[i].pos.addScaledVector(pData[i].vel, 1); pData[i].vel.y -= dt * 0.6;
                dObj.position.copy(pData[i].pos); dObj.scale.setScalar(pData[i].life * 1.5); 
                dObj.quaternion.copy(batRot); dObj.rotation.z += dt * 5; 
                dObj.updateMatrix(); particles.setMatrixAt(i, dObj.matrix); pDirty = true;
            } else if(pData[i].life > -1) { pData[i].life = -2; dObj.scale.setScalar(0); dObj.updateMatrix(); particles.setMatrixAt(i, dObj.matrix); pDirty = true; }
        }
        if(pDirty) particles.instanceMatrix.needsUpdate = true;
        renderer.render(battleScene, battleCamera);
    }
}
requestAnimationFrame(animate);

</script>
