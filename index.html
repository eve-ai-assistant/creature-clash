<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Creature Clash</title>
    <style>
        /* MOBILE-FIRST VERTICAL UI & SAFE AREAS */
        :root {
            --sat: env(safe-area-inset-top, 20px);
            --sab: env(safe-area-inset-bottom, 20px);
            --bg: #2C3E50; --panel: #34495E; --primary: #3498DB;
            --success: #2ECC71; --danger: #E74C3C; --warning: #F1C40F;
        }
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0; touch-action: none; }
        body { background: var(--bg); overflow: hidden; width: 100vw; height: 100vh; color: white; }
        
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .screen { position: absolute; inset: 0; z-index: 10; display: none; flex-direction: column; pointer-events: none; padding: var(--sat) 15px var(--sab) 15px; }
        .active-screen { display: flex; }
        .interactive { pointer-events: auto; }

        .btn { background: var(--primary); color: white; border: 3px solid rgba(255,255,255,0.8); border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 900; cursor: pointer; text-align: center; text-transform: uppercase; box-shadow: 0 5px 0 rgba(0,0,0,0.4); transition: transform 0.1s, box-shadow 0.1s; letter-spacing: 1px;}
        .btn:active { transform: translateY(5px); box-shadow: 0 0px 0 rgba(0,0,0,0.4); }
        .btn-danger { background: var(--danger); } .btn-success { background: var(--success); }

        /* MENU */
        #menu-ui { background: linear-gradient(135deg, #2C3E50, #1A252F); align-items: center; justify-content: center; pointer-events: auto; }
        .title { font-size: 50px; font-weight: 900; color: var(--warning); text-shadow: 4px 4px 0 #000; margin-bottom: 50px; text-align: center; line-height: 1.1; letter-spacing: 2px;}

        /* EXPLORE MAP */
        #explore-ui { justify-content: space-between; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        .pill { background: rgba(0,0,0,0.7); padding: 12px 20px; border-radius: 25px; font-weight: bold; border: 2px solid rgba(255,255,255,0.3); backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #joystick-zone { position: absolute; bottom: 0; left: 0; width: 100%; height: 55%; pointer-events: auto; }
        #joy-base { position: absolute; width: 130px; height: 130px; background: rgba(0,0,0,0.25); border: 3px solid rgba(255,255,255,0.4); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; display: none; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        #joy-knob { position: absolute; width: 60px; height: 60px; background: rgba(255,255,255,0.95); border: 4px solid #333; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; box-shadow: 0 5px 10px rgba(0,0,0,0.4); }

        /* BATTLE */
        #battle-ui { justify-content: space-between; }
        .hud { background: rgba(52, 73, 94, 0.95); border: 3px solid rgba(255,255,255,0.9); border-radius: 14px; padding: 12px; width: 65%; box-shadow: 0 6px 15px rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        .hud.enemy { align-self: flex-end; } .hud.player { align-self: flex-start; margin-top: 25px; }
        .c-name { font-weight: 900; font-size: 16px; margin-bottom: 6px; display: flex; justify-content: space-between; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .hp-bg { width: 100%; height: 14px; background: #222; border-radius: 7px; border: 2px solid #555; overflow: hidden; }
        .hp-fill { height: 100%; background: var(--success); width: 100%; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s; }
        .type-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-shadow: none; border: 1px solid rgba(255,255,255,0.3); }
        
        .battle-bottom { display: flex; flex-direction: column; gap: 12px; pointer-events: auto; }
        .msg-box { background: rgba(0,0,0,0.85); border: 3px solid rgba(255,255,255,0.9); border-radius: 14px; padding: 18px; font-size: 18px; font-weight: bold; min-height: 70px; text-align: center; box-shadow: 0 6px 15px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; line-height: 1.3;}
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        #moves-menu { display: none; }
        .move-details { font-size: 11px; color: rgba(255,255,255,0.7); display: block; margin-top: 4px; font-weight: 600; }

        /* POKEDEX */
        #pokedex-ui { background: var(--bg); pointer-events: auto; }
        .dex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 15px; overflow-y: auto; padding-bottom: 20px; margin-top: 20px; align-content: flex-start; }
        .dex-card { background: var(--panel); border: 3px solid #555; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; aspect-ratio: 1; cursor: pointer; transition: transform 0.1s; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .dex-card:active { transform: scale(0.95); }
        .dex-card img { width: 55px; height: 55px; image-rendering: pixelated; margin-bottom: 5px; }
        .dex-card.uncaught img { filter: brightness(0); opacity: 0.2; }
        .dex-id { font-size: 11px; color: #ccc; font-weight: bold; }
        .dex-name { font-size: 12px; font-weight: 900; margin-top: 2px; }

        #flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 100; transition: opacity 0.2s; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <canvas id="game-canvas"></canvas>
    <div id="flash"></div>

    <div id="menu-ui" class="screen active-screen">
        <div class="title">CREATURE<br>CLASH</div>
        <button class="btn interactive" onclick="startAdventure()" style="padding: 20px 50px; font-size: 22px;">Play Game</button>
        <div style="color:rgba(255,255,255,0.5); font-size:12px; font-weight:bold; position:absolute; bottom:30px;">AUDIO SYNTHESIZER ACTIVE</div>
    </div>

    <div id="explore-ui" class="screen">
        <div class="top-bar interactive">
            <div class="pill" onclick="healTeam()" style="cursor:pointer;" id="heal-btn">✚ Heal Lead</div>
            <div class="pill" onclick="openPokedex()" style="cursor:pointer; background:var(--primary);">📖 <span id="dex-count">1</span>/28</div>
        </div>
        <div id="joystick-zone">
            <div id="joy-base"><div id="joy-knob"></div></div>
        </div>
    </div>

    <div id="battle-ui" class="screen">
        <div class="hud enemy">
            <div class="c-name"><span id="e-name">Wild</span> <span class="type-tag" id="e-type">TYPE</span></div>
            <div style="font-size:12px; font-weight:bold; margin-bottom:5px; text-align:right;">Lv.<span id="e-lvl">5</span></div>
            <div class="hp-bg"><div class="hp-fill" id="e-hp"></div></div>
        </div>
        <div class="hud player">
            <div class="c-name"><span id="p-name">Player</span> <span class="type-tag" id="p-type">TYPE</span></div>
            <div style="font-size:12px; font-weight:bold; margin-bottom:5px; text-align:right;">Lv.<span id="p-lvl">5</span></div>
            <div class="hp-bg"><div class="hp-fill" id="p-hp"></div></div>
        </div>
        <div style="flex:1;"></div>
        <div class="battle-bottom">
            <div class="msg-box" id="msg-box">A wild creature appeared!</div>
            <div class="action-grid" id="main-menu">
                <button class="btn" onclick="showMoves()">Fight</button>
                <button class="btn btn-success" onclick="attemptCapture()">Catch</button>
                <button class="btn" onclick="healTeam(); logMsg('Used Potion!'); setTimeout(enemyTurn, 1500);" style="background:#9B59B6;">Potion</button>
                <button class="btn btn-danger" onclick="runAway()">Run</button>
            </div>
            <div class="action-grid" id="moves-menu">
                <button class="btn" id="btn-m0" onclick="attack(0)">Move 1</button>
                <button class="btn" id="btn-m1" onclick="attack(1)">Move 2</button>
                <button class="btn" style="grid-column: span 2; background:#7F8C8D;" onclick="showMainMenu()">Back</button>
            </div>
        </div>
    </div>

    <div id="pokedex-ui" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; padding-top: 10px;">
            <h2 style="font-weight:900;">DATABASE</h2>
            <button class="btn btn-danger" onclick="closePokedex()" style="padding:10px 20px;">Close</button>
        </div>
        <div style="color:var(--success); font-weight:bold; font-size:13px; margin-top:15px; text-align:center;">Tap any caught creature to set as Lead!</div>
        <div class="dex-grid" id="dex-grid"></div>
    </div>

<script>
/**
 * CREATURE CLASH - ELITE ENGINE
 * Zero dependencies. Generative Graphics. Generative Audio. 60FPS. Strict <15 Draw Calls.
 */

// ==========================================
// 1. DATA & MATHEMATICAL BALANCE
// ==========================================
const TYPES = {
    FIRE: { c: '#E74C3C', w: 'WATER', s: 'GRASS' }, WATER: { c: '#3498DB', w: 'ELECTRIC', s: 'FIRE' },
    GRASS: { c: '#2ECC71', w: 'FIRE', s: 'EARTH' }, ELECTRIC: { c: '#F1C40F', w: 'EARTH', s: 'WATER' },
    EARTH: { c: '#E67E22', w: 'GRASS', s: 'ELECTRIC' }, WIND: { c: '#9B59B6', w: 'ELECTRIC', s: 'EARTH' },
    NORMAL: { c: '#95A5A6', w: '', s: '' }
};

const MOVES = {
    'Tackle': { p: 40, t: 'NORMAL' }, 'Scratch': { p: 40, t: 'NORMAL' }, 'Bite': { p: 60, t: 'NORMAL' }, 'Slam': { p: 70, t: 'NORMAL' },
    'Ember': { p: 45, t: 'FIRE' }, 'Flamethrower': { p: 90, t: 'FIRE' },
    'Water Gun': { p: 45, t: 'WATER' }, 'Hydro Pump': { p: 90, t: 'WATER' },
    'Vine Whip': { p: 45, t: 'GRASS' }, 'Solar Beam': { p: 100, t: 'GRASS' },
    'Spark': { p: 45, t: 'ELECTRIC' }, 'Thunder': { p: 90, t: 'ELECTRIC' },
    'Mud Slap': { p: 45, t: 'EARTH' }, 'Earthquake': { p: 100, t: 'EARTH' },
    'Gust': { p: 45, t: 'WIND' }, 'Hurricane': { p: 90, t: 'WIND' }
};

// 28 Distinct Procedural Creatures
const CREATURES = [
    { id: 0, name: "Ignifox", type: "FIRE", hp: 45, atk: 65, def: 40, spd: 70, m: ["Scratch", "Ember"], sh: "Quadruped", ex: "Tail" },
    { id: 1, name: "Aquaturt", type: "WATER", hp: 55, atk: 45, def: 75, spd: 30, m: ["Tackle", "Water Gun"], sh: "Quadruped", ex: "Shell" },
    { id: 2, name: "Floratoad", type: "GRASS", hp: 55, atk: 55, def: 55, spd: 45, m: ["Tackle", "Vine Whip"], sh: "Biped", ex: "Horns" },
    { id: 3, name: "Sparkmouse", type: "ELECTRIC", hp: 35, atk: 55, def: 40, spd: 95, m: ["Scratch", "Spark"], sh: "Quadruped", ex: "Ears" },
    { id: 4, name: "Terrabear", type: "EARTH", hp: 75, atk: 70, def: 60, spd: 40, m: ["Scratch", "Mud Slap"], sh: "Biped", ex: "None" },
    { id: 5, name: "Aerojay", type: "WIND", hp: 40, atk: 55, def: 40, spd: 80, m: ["Tackle", "Gust"], sh: "Bird", ex: "Wings" },
    { id: 6, name: "Normdog", type: "NORMAL", hp: 50, atk: 55, def: 50, spd: 60, m: ["Bite", "Tackle"], sh: "Quadruped", ex: "Tail" },
    { id: 7, name: "Pyrolisk", type: "FIRE", hp: 45, atk: 70, def: 35, spd: 75, m: ["Bite", "Ember"], sh: "Serpentine", ex: "Horns" },
    { id: 8, name: "Tidecrab", type: "WATER", hp: 45, atk: 60, def: 85, spd: 25, m: ["Scratch", "Water Gun"], sh: "Bug", ex: "Shell" },
    { id: 9, name: "Vineviper", type: "GRASS", hp: 45, atk: 65, def: 40, spd: 75, m: ["Bite", "Vine Whip"], sh: "Serpentine", ex: "Tail" },
    { id: 10, name: "Volteel", type: "ELECTRIC", hp: 50, atk: 70, def: 45, spd: 85, m: ["Tackle", "Spark"], sh: "Serpentine", ex: "None" },
    { id: 11, name: "Mudboar", type: "EARTH", hp: 70, atk: 65, def: 60, spd: 45, m: ["Slam", "Mud Slap"], sh: "Quadruped", ex: "Horns" },
    { id: 12, name: "Zephyrmoth", type: "WIND", hp: 50, atk: 50, def: 50, spd: 65, m: ["Scratch", "Gust"], sh: "Bug", ex: "Wings" },
    { id: 13, name: "Strikehare", type: "NORMAL", hp: 40, atk: 60, def: 40, spd: 90, m: ["Scratch", "Slam"], sh: "Biped", ex: "Ears" },
    { id: 14, name: "Emberaptor", type: "FIRE", hp: 55, atk: 80, def: 45, spd: 85, m: ["Scratch", "Flamethrower"], sh: "Biped", ex: "Tail" },
    { id: 15, name: "Frostphin", type: "WATER", hp: 65, atk: 55, def: 60, spd: 75, m: ["Tackle", "Hydro Pump"], sh: "Fish", ex: "None" },
    { id: 16, name: "Rootstag", type: "GRASS", hp: 70, atk: 70, def: 65, spd: 60, m: ["Slam", "Solar Beam"], sh: "Quadruped", ex: "Horns" },
    { id: 17, name: "Thunderbug", type: "ELECTRIC", hp: 50, atk: 60, def: 70, spd: 55, m: ["Tackle", "Thunder"], sh: "Bug", ex: "None" },
    { id: 18, name: "Dunerhino", type: "EARTH", hp: 85, atk: 75, def: 90, spd: 30, m: ["Slam", "Earthquake"], sh: "Quadruped", ex: "Horns" },
    { id: 19, name: "Gusteagle", type: "WIND", hp: 60, atk: 80, def: 55, spd: 95, m: ["Scratch", "Hurricane"], sh: "Bird", ex: "Wings" },
    { id: 20, name: "Plaincat", type: "NORMAL", hp: 45, atk: 60, def: 40, spd: 85, m: ["Scratch", "Bite"], sh: "Quadruped", ex: "Tail" },
    { id: 21, name: "Magmape", type: "FIRE", hp: 75, atk: 85, def: 65, spd: 55, m: ["Slam", "Flamethrower"], sh: "Biped", ex: "None" },
    { id: 22, name: "Deepshark", type: "WATER", hp: 80, atk: 90, def: 55, spd: 70, m: ["Bite", "Hydro Pump"], sh: "Fish", ex: "Tail" },
    { id: 23, name: "Petalmantis", type: "GRASS", hp: 55, atk: 85, def: 55, spd: 80, m: ["Scratch", "Solar Beam"], sh: "Bug", ex: "Wings" },
    { id: 24, name: "Zapcheetah", type: "ELECTRIC", hp: 60, atk: 80, def: 50, spd: 110, m: ["Scratch", "Thunder"], sh: "Quadruped", ex: "Tail" },
    { id: 25, name: "Golemoth", type: "EARTH", hp: 95, atk: 80, def: 100, spd: 25, m: ["Slam", "Earthquake"], sh: "Biped", ex: "Shell" },
    { id: 26, name: "Hurricanine", type: "WIND", hp: 65, atk: 85, def: 60, spd: 100, m: ["Bite", "Hurricane"], sh: "Quadruped", ex: "Wings" },
    { id: 27, name: "Omnidragon", type: "NORMAL", hp: 105, atk: 105, def: 95, spd: 95, m: ["Earthquake", "Hurricane"], sh: "Serpentine", ex: "Wings" },
];

let STATE = 'MENU';
let playerTeam = [], pokedex = [];
let battleLock = false, currentEnemy = null;

// ==========================================
// 2. SYNTHETIC AUDIO ENGINE (No Autoplay Blocks)
// ==========================================
let audioCtx;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}
// Attach to document to ensure strictly initialized on first user tap
document.body.addEventListener('pointerdown', initAudio, { once: true });

function playSnd(type) {
    if(!audioCtx || audioCtx.state !== 'running') return;
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    
    if(type === 'hit') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.exponentialRampToValueAtTime(50, t + 0.2);
        gain.gain.setValueAtTime(0.3, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
        osc.start(t); osc.stop(t + 0.2);
    } else if(type === 'throw') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(800, t); osc.frequency.exponentialRampToValueAtTime(300, t + 0.4);
        gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
        osc.start(t); osc.stop(t + 0.4);
    } else if(type === 'shake') {
        osc.type = 'square'; osc.frequency.setValueAtTime(100, t);
        gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
        osc.start(t); osc.stop(t + 0.1);
    } else if(type === 'success') {
        osc.type = 'square'; osc.frequency.setValueAtTime(400, t); osc.frequency.setValueAtTime(600, t + 0.2); osc.frequency.setValueAtTime(800, t + 0.4);
        gain.gain.setValueAtTime(0.2, t); gain.gain.linearRampToValueAtTime(0.2, t + 0.6); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.8);
        osc.start(t); osc.stop(t + 0.8);
    } else if(type === 'faint') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, t); osc.frequency.linearRampToValueAtTime(50, t + 0.5);
        gain.gain.setValueAtTime(0.3, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
        osc.start(t); osc.stop(t + 0.5);
    } else if(type === 'encounter') {
        osc.type = 'square'; osc.frequency.setValueAtTime(500, t); osc.frequency.setValueAtTime(750, t + 0.1); osc.frequency.setValueAtTime(1000, t + 0.2);
        gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
        osc.start(t); osc.stop(t + 0.4);
    } else if(type === 'super') {
        osc.type = 'square'; osc.frequency.setValueAtTime(300, t); osc.frequency.setValueAtTime(400, t + 0.1);
        gain.gain.setValueAtTime(0.3, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
        osc.start(t); osc.stop(t + 0.3);
    }
}

// ==========================================
// 3. PROCEDURAL GRAPHICS (Atlas Generator)
// ==========================================
const texCanvas = document.createElement('canvas');
texCanvas.width = 1024; texCanvas.height = 1024;
const tCtx = texCanvas.getContext('2d');

function shade(c, p) {
    let R = parseInt(c.substring(1,3),16), G = parseInt(c.substring(3,5),16), B = parseInt(c.substring(5,7),16);
    R = Math.max(0, Math.min(255, parseInt(R * (100 + p) / 100))); G = Math.max(0, Math.min(255, parseInt(G * (100 + p) / 100))); B = Math.max(0, Math.min(255, parseInt(B * (100 + p) / 100)));
    return "#"+(R.toString(16).padStart(2,'0'))+(G.toString(16).padStart(2,'0'))+(B.toString(16).padStart(2,'0'));
}

function drawProceduralCreatures() {
    CREATURES.forEach((c, i) => {
        const x = (i % 8) * 128 + 64, y = Math.floor(i / 8) * 128 + 64;
        tCtx.save(); tCtx.translate(x, y);
        
        const clr = TYPES[c.type].c, dClr = shade(clr, -30), lClr = shade(clr, 30);
        
        // Shadow base
        tCtx.fillStyle = 'rgba(0,0,0,0.3)'; tCtx.beginPath(); tCtx.ellipse(0, 45, 35, 10, 0, 0, Math.PI*2); tCtx.fill();
        tCtx.lineWidth = 5; tCtx.strokeStyle = '#1A252F'; tCtx.lineJoin = 'round';

        const drawFn = () => {
            if (c.sh === 'Quadruped') {
                tCtx.fillStyle = dClr;
                [[-15, 30], [15, 30], [-5, 40], [25, 40]].forEach(p => { tCtx.beginPath(); tCtx.roundRect(p[0]-7, 10, 14, p[1]-10, 7); tCtx.fill(); tCtx.stroke(); });
                if(c.ex === 'Tail') { tCtx.beginPath(); tCtx.moveTo(-20, 0); tCtx.lineTo(-45, -20); tCtx.lineTo(-35, 10); tCtx.fill(); tCtx.stroke(); }
                if(c.ex === 'Wings') { tCtx.fillStyle='rgba(255,255,255,0.8)'; tCtx.beginPath(); tCtx.ellipse(0, -15, 35, 15, Math.PI/4, 0, Math.PI*2); tCtx.fill(); tCtx.stroke(); tCtx.fillStyle=dClr; }
                if(c.ex === 'Shell') { tCtx.fillStyle='#555'; tCtx.beginPath(); tCtx.arc(0, 5, 30, Math.PI, 0); tCtx.fill(); tCtx.stroke(); }
                tCtx.fillStyle = clr; tCtx.beginPath(); tCtx.ellipse(0, 10, 38, 22, 0, 0, Math.PI*2); tCtx.fill(); tCtx.stroke();
                tCtx.beginPath(); tCtx.arc(22, -10, 18, 0, Math.PI*2); tCtx.fill(); tCtx.stroke();
                if(c.ex === 'Horns') { tCtx.fillStyle='#ddd'; tCtx.beginPath(); tCtx.moveTo(22, -28); tCtx.lineTo(10, -50); tCtx.lineTo(34, -28); tCtx.fill(); tCtx.stroke(); }
                if(c.ex === 'Ears') { tCtx.beginPath(); tCtx.ellipse(15,-25, 6,15, Math.PI/4,0,Math.PI*2); tCtx.ellipse(30,-25, 6,15, -Math.PI/4,0,Math.PI*2); tCtx.fill(); tCtx.stroke(); }
                tCtx.fillStyle='#fff'; tCtx.beginPath(); tCtx.arc(28, -15, 5, 0, Math.PI*2); tCtx.fill(); tCtx.fillStyle='#000'; tCtx.beginPath(); tCtx.arc(30, -15, 2.5, 0, Math.PI*2); tCtx.fill();
            } 
            else if (c.sh === 'Biped') {

// Helper to window into texture atlas
function setUVs(geo, id) {
    const col = id % 8, row = Math.floor(id / 8);
    const uvs = geo.attributes.uv;
    // Slight inset to prevent edge bleeding entirely
    const pad = 0.005;
    const u0 = col/8 + pad, v0 = 1 - (row+1)/8 + pad, u1 = (col+1)/8 - pad, v1 = 1 - row/8 - pad;
    uvs.setXY(0, u0, v1); uvs.setXY(1, u1, v1); uvs.setXY(2, u0, v0); uvs.setXY(3, u1, v0);
    uvs.needsUpdate = true;
}

function loadSave() {
    try {
        const s = localStorage.getItem('crcl_v2');
        if(s) { const d = JSON.parse(s); playerTeam = d.t; pokedex = d.p; } 
        else throw "new";
    } catch(e) {
        playerTeam = [{ id:0, level:5, hp:CREATURES[0].hp, maxHp:CREATURES[0].hp, atk:CREATURES[0].atk, def:CREATURES[0].def, spd:CREATURES[0].spd, m:CREATURES[0].m }];
        pokedex = [0]; saveGame();
    }
}
function saveGame() { try { localStorage.setItem('crcl_v2', JSON.stringify({t: playerTeam, p: pokedex})); } catch(e){} }

function startAdventure() {
    initAudio(); loadSave();
    document.getElementById('menu-ui').classList.remove('active-screen'); document.getElementById('explore-ui').classList.add('active-screen');
    document.getElementById('dex-count').innerText = pokedex.length; document.getElementById('heal-btn').innerText = `✚ Heal ${CREATURES[playerTeam[0].id].name}`;
    STATE = 'MAP';
}

function healTeam() {
    playSnd('success'); playerTeam[0].hp = playerTeam[0].maxHp; saveGame();
    const d = document.createElement('div'); d.innerText = "Lead Healed!"; d.style.cssText = "position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.8); padding:20px; border-radius:10px; font-weight:bold; z-index:100;";
    document.body.appendChild(d); setTimeout(()=>document.body.removeChild(d), 1000);
}

function openPokedex() {
    STATE = 'POKEDEX'; resetJoy(); document.getElementById('explore-ui').classList.remove('active-screen'); document.getElementById('pokedex-ui').classList.add('active-screen');
    const g = document.getElementById('dex-grid'); g.innerHTML = '';
    CREATURES.forEach((c, i) => {
        const caught = pokedex.includes(c.id);
        const card = document.createElement('div'); card.className = `dex-card ${caught ? '' : 'uncaught'}`;
        const cvs = document.createElement('canvas'); cvs.width=64; cvs.height=64; const ctx = cvs.getContext('2d');
        ctx.drawImage(texCanvas, (i%8)*128, Math.floor(i/8)*128, 128, 128, 0, 0, 64, 64);
        const img = document.createElement('img'); img.src = cvs.toDataURL(); card.appendChild(img);
        
        const idL = document.createElement('div'); idL.className='dex-id'; idL.innerText=`#${(c.id+1).toString().padStart(3,'0')}`; card.appendChild(idL);
        const nL = document.createElement('div'); nL.className='dex-name'; nL.innerText= caught ? c.name : '???'; card.appendChild(nL);
        
        if(caught) {
            card.onclick = () => { 
                playSnd('success');
                const t = playerTeam.find(pt => pt.id === c.id);
                if(t) { const idx = playerTeam.indexOf(t); playerTeam.splice(idx,1); playerTeam.unshift(t); } 
                else { playerTeam.unshift({ id:c.id, level:5, hp:c.hp, maxHp:c.hp, atk:c.atk, def:c.def, spd:c.spd, m:c.m }); if(playerTeam.length>6) playerTeam.pop(); }
                saveGame(); closePokedex(); document.getElementById('heal-btn').innerText = `✚ Heal ${c.name}`;
            };
        }
        g.appendChild(card);
    });
}
function closePokedex() { STATE = 'MAP'; document.getElementById('pokedex-ui').classList.remove('active-screen'); document.getElementById('explore-ui').classList.add('active-screen'); }

function showMoves() {

    [0,1].forEach(i => {

function showMainMenu() { document.getElementById('main-menu').style.display='grid'; document.getElementById('moves-menu').style.display='none'; playSnd('hit'); }

function attack(mIdx) {
    if(battleLock) return; battleLock = true; document.getElementById('moves-menu').style.display='none';
    const pMName = playerTeam[0].m[mIdx], eMName = currentEnemy.m[Math.floor(Math.random()*currentEnemy.m.length)];
    const pFirst = playerTeam[0].spd >= currentEnemy.spd;
    const f = pFirst ? {a:'P', m:pMName} : {a:'E', m:eMName}, s = pFirst ? {a:'E', m:eMName} : {a:'P', m:pMName};
    
    execTurn(f.a, f.m, () => {
        if(checkEnd()) return;
        setTimeout(() => { execTurn(s.a, s.m, () => { if(!checkEnd()) { showMainMenu(); battleLock=false; } }); }, 1000);
    });
}

function enemyTurn() {
    battleLock = true; document.getElementById('main-menu').style.display='none';
    const eMName = currentEnemy.m[Math.floor(Math.random()*currentEnemy.m.length)];
    execTurn('E', eMName, () => { if(!checkEnd()) { showMainMenu(); battleLock=false; } });
}

function emitParticles(pos, colorHex) {
    ptMat.color.setHex(colorHex); let spawned = 0;
    for(let i=0; i<50; i++) {
        if(pData[i].life <= 0) {
            pData[i].life = 1.0; pData[i].pos.copy(pos); pData[i].pos.x += (Math.random()-0.5)*2; pData[i].pos.y += (Math.random()-0.5)*2;
            pData[i].vel.set((Math.random()-0.5)*0.2, Math.random()*0.2, (Math.random()-0.5)*0.2);
            spawned++; if(spawned >= 20) break;
        }
    }
}

function execTurn(who, mName, cb) {
    const isP = who==='P', msh = isP?bPlayerMesh:bEnemyMesh, tgt = isP?bEnemyMesh:bPlayerMesh;
    const att = isP?playerTeam[0]:currentEnemy, def = isP?currentEnemy:playerTeam[0];
    const mData = MOVES[mName], defBase = CREATURES[def.id], attBase = CREATURES[att.id];
    
    logMsg(`${attBase.name} used ${mName}!`);
    const oP = msh.position.clone(); msh.position.x += isP?1:-1; msh.position.z -= isP?1:-1;
    
    setTimeout(() => {
        msh.position.copy(oP);
        const tO = tgt.position.clone(); tgt.position.x+=0.5; setTimeout(()=>{tgt.position.x-=1; setTimeout(()=>{tgt.position.copy(tO);},50);},50);
        
        let eff = 1; if(TYPES[mData.t].s===defBase.type) eff=2; if(TYPES[mData.t].w===defBase.type) eff=0.5;
        let dmg = (((2*att.level/5+2)*mData.p*(att.atk/def.def))/50)+2;
        if(mData.t===attBase.type) dmg*=1.5; // STAB
        dmg = Math.max(1, Math.floor(dmg * eff * (0.85+Math.random()*0.15)));
        
        def.hp = Math.max(0, def.hp - dmg); updateBattleUI();
        
        const hexColor = parseInt(TYPES[mData.t].c.replace('#', '0x')); emitParticles(tgt.position, hexColor);
        
        if(eff>1) { playSnd('super'); setTimeout(()=>logMsg("Super effective!"), 1000); setTimeout(cb, 2200); }
        else if(eff<1) { playSnd('hit'); setTimeout(()=>logMsg("Not very effective..."), 1000); setTimeout(cb, 2200); }
        else { playSnd('hit'); setTimeout(cb, 1200); }
    }, 300);
}

function checkEnd() {
    if(currentEnemy.hp <= 0) {
        playSnd('faint'); bEnemyMesh.visible=false; logMsg(`Wild ${CREATURES[currentEnemy.id].name} fainted! You won!`);
        playerTeam[0].level++; playerTeam[0].maxHp+=2; playerTeam[0].atk+=1; playerTeam[0].def+=1; playerTeam[0].spd+=1;
        if(!pokedex.includes(currentEnemy.id)) pokedex.push(currentEnemy.id);
        saveGame(); setTimeout(exitBattle, 2500); return true;
    }
    if(playerTeam[0].hp <= 0) {
        playSnd('faint'); bPlayerMesh.visible=false; logMsg("You blacked out!"); playerTeam[0].hp=playerTeam[0].maxHp;
        setTimeout(exitBattle, 2500); return true;
    }
    return false;
}

function attemptCapture() {
    if(battleLock) return; battleLock = true; document.getElementById('main-menu').style.display='none';
    logMsg("Threw a Capture Device!"); playSnd('throw');
    ballMesh.position.set(-3,2,2); ballMesh.visible=true;
    
    let stp = 0;
    const intv = setInterval(() => {
        stp += 0.05; ballMesh.position.lerpVectors(new THREE.Vector3(-3,2,2), bEnemyMesh.position, stp); ballMesh.position.y += Math.sin(stp*Math.PI)*2;
        if(stp>=1) {
            clearInterval(intv); bEnemyMesh.visible=false; ballMesh.position.copy(bEnemyMesh.position); ballMesh.position.y=0.5;
            let shk = 0;
            const sIntv = setInterval(() => {
                shk++; playSnd('shake'); ballMesh.rotation.z=0.5; setTimeout(()=>ballMesh.rotation.z=-0.5,100); setTimeout(()=>ballMesh.rotation.z=batRot.z,200);
                if(shk>=3) {
                    clearInterval(sIntv);
                    const hpRatio = currentEnemy.hp/currentEnemy.maxHp;
                    let chance = 0.3 + (1-hpRatio)*0.7; if(hpRatio <= 0.05) chance = 1.0; // Pity mechanic
                    
                    if(Math.random() < chance) {
                        playSnd('success'); logMsg(`Gotcha! ${CREATURES[currentEnemy.id].name} caught!`);
                        if(playerTeam.length<6) playerTeam.push(JSON.parse(JSON.stringify(currentEnemy)));
                        if(!pokedex.includes(currentEnemy.id)) pokedex.push(currentEnemy.id);
                        document.getElementById('dex-count').innerText = pokedex.length; saveGame(); setTimeout(exitBattle, 2500);
                    } else {
                        playSnd('hit'); logMsg("It broke free!"); ballMesh.visible=false; bEnemyMesh.visible=true;
                        setTimeout(enemyTurn, 1500);
                    }
                }
            }, 800);
        }
    }, 16);
}

function runAway() { if(battleLock) return; battleLock=true; document.getElementById('main-menu').style.display='none'; logMsg("Got away safely!"); setTimeout(exitBattle, 1200); }
function exitBattle() { STATE = 'MAP'; battleLock=false; resetJoy(); document.getElementById('battle-ui').classList.remove('active-screen'); document.getElementById('explore-ui').classList.add('active-screen'); }

// ==========================================
// 6. INPUT & RENDER LOOP
// ==========================================
const joyZone = document.getElementById('joystick-zone'), joyBase = document.getElementById('joy-base'), joyKnob = document.getElementById('joy-knob');
let joyActive = false, jDir = {x:0, y:0}, jOrig = {x:0, y:0};

// Universal Input Reset to prevent adversarial stuck states
const resetJoy = () => { joyActive=false; jDir={x:0,y:0}; joyKnob.style.transform=`translate(-50%,-50%)`; joyBase.style.display='none'; };
joyZone.addEventListener('pointerdown', e => { if(STATE !== 'MAP') return; joyActive=true; jOrig={x:e.clientX, y:e.clientY}; joyBase.style.left=e.clientX+'px'; joyBase.style.top=e.clientY+'px'; joyBase.style.display='block'; updateJoy(e); });
window.addEventListener('pointermove', e => { if(joyActive && STATE === 'MAP') updateJoy(e); });
window.addEventListener('pointerup', resetJoy); window.addEventListener('pointercancel', resetJoy); window.addEventListener('pointerleave', resetJoy);

function updateJoy(e) {
    let dx = e.clientX-jOrig.x, dy = e.clientY-jOrig.y, dist = Math.hypot(dx,dy), max = 50;
    if(dist>max) { dx=(dx/dist)*max; dy=(dy/dist)*max; }
    joyKnob.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`; jDir.x=dx/max; jDir.y=dy/max;
}

let lastT = performance.now();
function animate(t) {
    requestAnimationFrame(animate); const dt = (t-lastT)/1000; lastT = t;
    
    if(STATE === 'MAP') {
        if(joyActive) {
            playerMesh.position.x += (jDir.x + jDir.y) * 8 * dt; playerMesh.position.z += (-jDir.x + jDir.y) * 8 * dt;
            if(playerMesh.position.x>10) playerMesh.position.x=10; if(playerMesh.position.x<-10) playerMesh.position.x=-10;
            if(playerMesh.position.z>10) playerMesh.position.z=10; if(playerMesh.position.z<-10) playerMesh.position.z=-10;
            
            for(let i=0; i<wildMeshes.length; i++) {
                if(playerMesh.position.distanceTo(wildMeshes[i].position) < 2.0) {
                    resetJoy(); playSnd('encounter');
                    enterBattle(wildMeshes[i].userData.id, Math.max(1, playerTeam[0].level + Math.floor(Math.random()*3)-1));
                    wildMeshes[i].position.set(playerMesh.position.x+(Math.random()-0.5)*20, 0.75, playerMesh.position.z+(Math.random()-0.5)*20);
                    break;
                }
            }
        }
        playerMesh.position.y = 1 + Math.sin(t*0.01)*0.1;
        wildMeshes.forEach((m, i) => { m.position.y = 0.75 + Math.sin(t*0.005+i)*0.1; m.position.x += Math.sin(t*0.001+i)*dt; m.position.z += Math.cos(t*0.001+i)*dt; });
        
        camera.position.x += ((playerMesh.position.x + 10) - camera.position.x) * 0.1;
        camera.position.z += ((playerMesh.position.z + 10) - camera.position.z) * 0.1;
        renderer.render(mapScene, camera);
        
    } else if(STATE === 'BATTLE') {
        if(!battleLock) { bPlayerMesh.position.y = 2 + Math.sin(t*0.005)*0.2; bEnemyMesh.position.y = 2 + Math.cos(t*0.005)*0.2; }
        
        // Update Particles
        let pDirty = false;
        for(let i=0; i<50; i++) {
            if(pData[i].life > 0) {
                pData[i].life -= dt * 2; pData[i].pos.addScaledVector(pData[i].vel, 1); pData[i].vel.y -= dt*0.5; // gravity
                dObj.position.copy(pData[i].pos); dObj.scale.setScalar(pData[i].life); dObj.rotation.copy(batRot);
                dObj.updateMatrix(); particles.setMatrixAt(i, dObj.matrix); pDirty = true;
            } else if(pData[i].life > -1) {
                pData[i].life = -2; dObj.scale.setScalar(0); dObj.updateMatrix(); particles.setMatrixAt(i, dObj.matrix); pDirty = true;
            }
        }
        if(pDirty) particles.instanceMatrix.needsUpdate = true;
        
        renderer.render(battleScene, camera);
    }
}
requestAnimationFrame(animate);

</script>
